name: Gym Portal CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'

    - name: Install Client Dependencies
      working-directory: ./client
      run: npm install

    - name: Build Client
      working-directory: ./client
      run: npm run build --if-present

    - name: Install Server Dependencies
      working-directory: ./server
      run: npm install

    - name: Test Server
      working-directory: ./server
      run: echo "Server ready for deployment"
